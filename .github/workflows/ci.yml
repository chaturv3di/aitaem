name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: python -m pytest --cov=aitaem --ignore=tests/test_connectors/test_bigquery_integration.py tests/

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff
        run: ruff check aitaem/ tests/

  type-check:
    name: type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[agent-evals,dev]"

      - name: Run mypy
        run: mypy aitaem/ tests/evals/

  import-graph:
    name: import-graph
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check import graph
        run: python scripts/check_import_graph.py

  test-agent:
    name: test-agent (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install agent dependencies
        run: uv pip install --system -e ".[agent-anthropic,dev]"

      - name: Run agent tests
        run: python -m pytest tests/test_agent/ --cov=aitaem/agent

  evals:
    name: evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install eval dependencies
        run: uv pip install --system -e ".[agent-evals,dev]"
      - name: Run reference eval harness
        run: python -m pytest tests/evals/

  agent-extra-smoke:
    name: agent-extra-smoke (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: agent-core
            import_check: "import aitaem.agent"
          - extra: agent-anthropic
            import_check: "import aitaem.agent"
          - extra: agent
            import_check: "import aitaem.agent"
          - extra: agent-evals
            import_check: "import aitaem.agent; import pydantic_evals"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install aitaem[${{ matrix.extra }}]
        run: uv pip install --system -e ".[${{ matrix.extra }}]"
      - name: Import smoke test
        run: python -c "${{ matrix.import_check }}"
