site_name: aitaem
site_description: "AITÆM: All Interesting Things Are Essentially Metrics — a Python library for generating data insights from OLAP databases or local CSV files."
site_url: https://chaturv3di.github.io/aitaem
repo_url: https://github.com/chaturv3di/aitaem
repo_name: chaturv3di/aitaem
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Writing Specs: user-guide/specs.md
      - Connectors: user-guide/connectors.md
      - Computing Metrics: user-guide/computing-metrics.md
  - API Reference:
      - Overview: api/index.md
      - MetricCompute: api/insights.md
      - Specs: api/specs.md
      - Connectors: api/connectors.md
      - Helpers: api/helpers.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
